name: Test Template

on: [push, pull_request]

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: generate (${{ matrix.name }})
    steps:
      - name: Checkout template repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: false

      - name: Install formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          pip install cmake-format

      - name: Generate project from template
        run: >-
          uvx cookiecutter --no-input .
          game_name="Tic Tac Toe"
          game_name_kebab="tic-tac-toe"
          game_slug="ttt"
          defaults="${{ matrix.defaults }}"

      - name: Upload generated project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  format:
    needs: generate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: format (${{ matrix.name }})
    steps:
      - name: Download generated project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe

      - name: Install formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          pip install cmake-format

      - name: Run clang-format
        working-directory: alpha-zero-game-tic-tac-toe
        run: |
          find . -name '*.h' -o -name '*.cc' | xargs clang-format --style=file --dry-run --Werror

      - name: Run cmake-format
        working-directory: alpha-zero-game-tic-tac-toe
        run: |
          find . -name 'CMakeLists.txt' -o -name '*.cmake' | xargs cmake-format --check

      - name: Upload formatted project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-formatted-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  build:
    needs: format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: build (${{ matrix.name }})
    steps:
      - name: Download formatted project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-formatted-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe

      - name: Configure CMake
        run: |
          cd alpha-zero-game-tic-tac-toe
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build the C++ project
        run: |
          cd alpha-zero-game-tic-tac-toe
          cmake --build build

      - name: Upload built project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-built-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  run:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: run (${{ matrix.name }})
    steps:
      - name: Download built project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-built-${{ matrix.name }}
          path: alpha-zero-game-tic-tac-toe

      - name: Run main
        run: |
          chmod +x alpha-zero-game-tic-tac-toe/build/ttt
          cd alpha-zero-game-tic-tac-toe
          ./build/ttt
