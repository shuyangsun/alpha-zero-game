name: Test Template

on: [push, pull_request]

jobs:
  generate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        name: [defaults-on, defaults-off]
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: generate (${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || 'macos' }}${{ matrix.name == 'defaults-on' && ', defaults' || '' }})
    steps:
      - name: Checkout template repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: false

      - name: Install formatters (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          pip install cmake-format

      - name: Install formatters (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install clang-format
          pipx install cmakelang

      - name: Generate project from template
        run: >-
          uvx cookiecutter --no-input .
          game_name="Tic Tac Toe"
          game_name_kebab="tic-tac-toe"
          game_slug="ttt"
          github_actions="yes"
          llm="yes"
          defaults="${{ matrix.defaults }}"

      - name: Upload generated project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-${{ matrix.name }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  format:
    needs: generate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        name: [defaults-on, defaults-off]
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: format (${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || 'macos' }}${{ matrix.name == 'defaults-on' && ', defaults' || '' }})
    steps:
      - name: Download generated project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-${{ matrix.name }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe

      - name: Install formatters (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          pip install cmake-format

      - name: Install formatters (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install clang-format
          pipx install cmakelang

      - name: Run clang-format
        working-directory: alpha-zero-game-tic-tac-toe
        run: |
          find . -name '*.h' -o -name '*.cc' | xargs clang-format --style=file --dry-run --Werror

      - name: Run cmake-format
        working-directory: alpha-zero-game-tic-tac-toe
        run: |
          find . -name 'CMakeLists.txt' -o -name '*.cmake' | xargs cmake-format --check

      - name: Upload formatted project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-formatted-${{ matrix.name }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  build:
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        name: [defaults-on, defaults-off]
        preset: [debug, release]
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: build (${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || 'macos' }}, ${{ matrix.preset }}${{ matrix.name == 'defaults-on' && ', defaults' || '' }})
    steps:
      - name: Download formatted project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-formatted-${{ matrix.name }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe

      - name: Configure CMake
        working-directory: alpha-zero-game-tic-tac-toe
        run: cmake --preset ${{ matrix.preset }}

      - name: Build the C++ project
        working-directory: alpha-zero-game-tic-tac-toe
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload built project
        uses: actions/upload-artifact@v7.0.1
        with:
          name: project-built-${{ matrix.name }}-${{ matrix.preset }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe
          include-hidden-files: true

  run:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        name: [defaults-on, defaults-off]
        preset: [debug, release]
        include:
          - name: defaults-on
            defaults: "yes"
          - name: defaults-off
            defaults: "no"
    name: run (${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || 'macos' }}, ${{ matrix.preset }}${{ matrix.name == 'defaults-on' && ', defaults' || '' }})
    steps:
      - name: Download built project
        uses: actions/download-artifact@v8.0.1
        with:
          name: project-built-${{ matrix.name }}-${{ matrix.preset }}-${{ matrix.os }}
          path: alpha-zero-game-tic-tac-toe

      - name: Run main
        working-directory: alpha-zero-game-tic-tac-toe
        run: |
          chmod +x build/${{ matrix.preset }}/ttt
          ./build/${{ matrix.preset }}/ttt
