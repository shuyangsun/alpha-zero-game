name: Test Template

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Generate project from template
        run: uvx cookiecutter --no-input .

      - name: Configure CMake
        run: |
          cd alpha-zero-game-tic-tac-toe
          cmake -S cmake_external_project -B cmake_external_project/build -DCMAKE_BUILD_TYPE=Release

      - name: Build the C++ project
        run: |
          cd alpha-zero-game-tic-tac-toe
          cmake --build cmake_external_project/build

      - name: Run main
        run: |
          cd alpha-zero-game-tic-tac-toe
          ./cmake_external_project/build/TicTacToe/tic-tac-toe
